# rtl-airwave-scanner — base configuration (generic, safe to commit)
#
# R820T-class RTL-SDR usable range is roughly 24–1766 MHz.
# We hop ~2 MHz windows (one sample-rate span per look).
#
# Site-specific ATC / local repeaters / AWOS ignores:
#   copy site.example.yaml → site.yaml and edit (gitignored).
#
# Priority order for SIGINT / disaster awareness (hopped when idle):
#   1) local voice nets (2m, 70cm FM, GMRS, MURS, marine)
#   2) wider ham (6m, 10m, 1.25m, full 70cm)
#   3) microwave ham (33cm, 23cm) — sparse traffic, still covered
#   4) ATC (toggle off by default in the UI)
#
# Note: 10m/6m SSB voice will show RF energy but demod is NFM-oriented;
#       FM simplex and digital noise still useful for “someone is on the air.”

device:
  serial: null
  sample_rate_hz: 2048000
  gain: 40.2
  ppm_error: 0
  # Multi-dongle (#5): uncomment when you have 2+ sticks.
  # List serials with:  .venv/bin/python -m scanner --list-devices
  # radios:
  #   - label: voice
  #     serial: null              # auto-assign first free dongle
  #     groups: [ham_2m, ham_70cm, gmrs, murs, marine, ham_1p25m]
  #   - label: atc
  #     serial: "00000002"        # second stick serial from --list-devices
  #     groups: [atc, ham_10m, ham_6m, ham_33cm, ham_23cm]
  # If radios: has 2+ entries with no groups, a default VHF-voice / ATC+wide split is applied.

detection:
  fft_size: 8192
  averages: 6
  snr_threshold_db: 12.0
  min_peak_separation_hz: 12500
  channel_bw_hz: 12500
  channel_step_hz: 12500
  edge_guard_fraction: 0.10
  min_active_seconds: 0.35
  hang_time_seconds: 1.2
  max_recording_seconds: 90
  spur_learn_seconds: 6
  spur_duty_threshold: 0.55
  ignore_bandwidth_hz: 12000
  ignored_frequencies_hz: []

known_channels:
  # --- Common US calling / nets ---
  - { name: "10m FM calling", frequency_hz: 29200000, match_hz: 15000, kind: voice, notes: "29.200 FM (region varies)" }
  - { name: "10m SSB calling", frequency_hz: 28400000, match_hz: 20000, kind: voice, notes: "28.400 USB (energy only)" }
  - { name: "6m FM calling", frequency_hz: 52525000, match_hz: 12000, kind: voice, notes: "52.525 FM" }
  - { name: "6m SSB calling", frequency_hz: 50125000, match_hz: 15000, kind: voice, notes: "50.125 USB (energy only)" }
  - { name: "2m national simplex", frequency_hz: 146520000, match_hz: 10000, kind: voice, notes: "146.520 FM calling" }
  - { name: "1.25m FM calling", frequency_hz: 223500000, match_hz: 12000, kind: voice, notes: "223.500 FM" }
  - { name: "70cm national simplex", frequency_hz: 446000000, match_hz: 10000, kind: voice, notes: "446.000 FM calling" }
  - { name: "33cm FM calling", frequency_hz: 927500000, match_hz: 15000, kind: voice, notes: "927.500 FM (region varies)" }
  - { name: "23cm FM calling", frequency_hz: 1296125000, match_hz: 15000, kind: voice, notes: "1296.125 FM (region varies)" }
  - { name: "MURS 1", frequency_hz: 151820000, match_hz: 8000, kind: voice, notes: "151.820" }
  - { name: "MURS 2", frequency_hz: 151880000, match_hz: 8000, kind: voice, notes: "151.880" }
  - { name: "MURS 3", frequency_hz: 151940000, match_hz: 8000, kind: voice, notes: "151.940" }
  - { name: "MURS 4", frequency_hz: 154570000, match_hz: 8000, kind: voice, notes: "154.570" }
  - { name: "MURS 5", frequency_hz: 154600000, match_hz: 8000, kind: voice, notes: "154.600" }
  # Full GMRS/FRS table auto-loaded via scan.include_all_gmrs_labels

quality:
  require_audio_quality: true
  min_audio_rms: 0.008
  min_dynamic_range_db: 4.0
  min_activity_ratio: 0.04
  min_voice_score: 0.25
  min_speech_band_ratio: 0.20
  keep_rejected_audio: false
  log_rejected: false

audio:
  sample_rate_hz: 16000
  deemphasis_tau: 75.0e-6
  # Post-save / playback voice cleanup (band-pass + light noise gate)
  speech_enhance: true
  speech_hp_hz: 300
  speech_lp_hz: 3400
  speech_gate: true
  speech_enhance_on_play: true   # also clean older WAVs when the viewer plays them

# Hop order = priority (most useful SIGINT first when all groups enabled)
bands:
  # ========== Tier 1: local voice / mutual aid (highest priority) ==========
  # 2 m

  - { name: "2m_144_146", start_hz: 144000000, stop_hz: 146000000, modulation: nfm, channel_bw_hz: 12500, group: ham_2m }
  - { name: "2m_146_148", start_hz: 146000000, stop_hz: 148000000, modulation: nfm, channel_bw_hz: 12500, group: ham_2m }
  # 70 cm — dense FM/repeater segment first
  - { name: "70cm_440_442", start_hz: 440000000, stop_hz: 442000000, modulation: nfm, channel_bw_hz: 12500, group: ham_70cm }
  - { name: "70cm_442_444", start_hz: 442000000, stop_hz: 444000000, modulation: nfm, channel_bw_hz: 12500, group: ham_70cm }
  - { name: "70cm_444_446", start_hz: 444000000, stop_hz: 446000000, modulation: nfm, channel_bw_hz: 12500, group: ham_70cm }
  - { name: "70cm_446_448", start_hz: 446000000, stop_hz: 448000000, modulation: nfm, channel_bw_hz: 12500, group: ham_70cm }
  - { name: "70cm_448_450", start_hz: 448000000, stop_hz: 450000000, modulation: nfm, channel_bw_hz: 12500, group: ham_70cm }
  # GMRS / FRS
  - { name: "gmrs_462_all", start_hz: 462500000, stop_hz: 462800000, modulation: nfm, channel_bw_hz: 12500, group: gmrs }
  - { name: "gmrs_467_all", start_hz: 467500000, stop_hz: 467800000, modulation: nfm, channel_bw_hz: 12500, group: gmrs }
  # MURS
  - { name: "murs_151_155", start_hz: 151500000, stop_hz: 153500000, modulation: nfm, channel_bw_hz: 12500, group: murs }
  - { name: "murs_154_156", start_hz: 154000000, stop_hz: 155500000, modulation: nfm, channel_bw_hz: 12500, group: murs }
  # Marine VHF
  - { name: "marine_156_158", start_hz: 156000000, stop_hz: 158000000, modulation: nfm, channel_bw_hz: 12500, group: marine }
  - { name: "marine_158_162", start_hz: 158000000, stop_hz: 162000000, modulation: nfm, channel_bw_hz: 12500, group: marine }
  # 1.25 m
  - { name: "1p25m_222_224", start_hz: 222000000, stop_hz: 224000000, modulation: nfm, channel_bw_hz: 12500, group: ham_1p25m }
  - { name: "1p25m_224_225", start_hz: 224000000, stop_hz: 225000000, modulation: nfm, channel_bw_hz: 12500, group: ham_1p25m }

  # ========== Tier 2: other VHF / upper HF ==========
  # 6 m (50–54)
  - { name: "6m_50_52", start_hz: 50000000, stop_hz: 52000000, modulation: nfm, channel_bw_hz: 12500, group: ham_6m }
  - { name: "6m_52_54", start_hz: 52000000, stop_hz: 54000000, modulation: nfm, channel_bw_hz: 12500, group: ham_6m }
  # 10 m (28.0–29.7) — R820T ok; SSB is energy-detect only with NFM demod
  - { name: "10m_28_29", start_hz: 28000000, stop_hz: 29700000, modulation: nfm, channel_bw_hz: 12500, group: ham_10m }

